<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attractive Task Manager</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Updated to use your uploaded background image */
            background-image: url('task back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        /* --- CENTER CONTAINER ATTRACTIVE CHANGES --- */
        .container {
            background: rgba(255, 255, 255, 0.95); /* Semi-transparent white */
            padding: 40px;
            border-radius: 20px; /* More rounded corners */
            
            /* Modern deep shadow with an inner glow */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), 
                        inset 0 0 15px rgba(255, 255, 255, 0.5);
            
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            overflow: hidden; /* For gradient border effect */
            transition: transform 0.3s ease;
            /* Slight offset to balance with the bottom-right graphic */
            margin-bottom: 50px; 
        }

        /* Subtle glow animation when container appears */
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25), 
                        inset 0 0 20px rgba(255, 255, 255, 0.6);
        }

        /* Decorative gradient border at the top */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #4a154b, #ff7e5f); /* Deep purple to orange */
        }
        /* ------------------------------------------- */

        h1 {
            color: #4a154b;
            font-size: 32px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }
        .input-section {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            background-color: #fcfcfc;
        }
        input:focus {
            border-color: #ff7e5f; /* Change focus color to gradient end */
            box-shadow: 0 0 10px rgba(255, 126, 95, 0.3);
        }
        .add-btn {
            padding: 15px 25px;
            background: linear-gradient(45deg, #4a154b, #7d2a84);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(74, 21, 75, 0.3);
        }
        .add-btn:hover {
            background: linear-gradient(45deg, #350f36, #5c1a61);
            box-shadow: 0 6px 15px rgba(74, 21, 75, 0.4);
            transform: scale(1.05);
        }
        ul {
            list-style: none;
        }
        li {
            background: #fff;
            border: 1px solid #eee;
            margin-bottom: 15px;
            padding: 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 17px;
            word-break: break-all;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: slideIn 0.4s ease-out;
        }
        li:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #ddd;
        }
        .delete-btn {
            background-color: transparent;
            color: #e63946;
            border: 2px solid #e63946;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .delete-btn:hover {
            background-color: #e63946;
            color: white;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.3);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Task Manager</h1>
        <div class="input-section">
            <input type="text" id="task" placeholder="Create a new task...">
            <button class="add-btn" onclick="addTask()">Add Task</button>
        </div>
        <ul id="taskList">
            <li><span>Morning Workout</span> <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button></li>
            <li><span>Review project proposal</span> <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button></li>
        </ul>
    </div>

    <script>
    function addTask() {
        let taskInput = document.getElementById("task");
        let taskValue = taskInput.value.trim();

        if(taskValue === "") {
            alert("Please enter a task!");
            return;
        }

        let li = document.createElement("li");
        li.innerHTML = `<span>${taskValue}</span> <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button>`;

        document.getElementById("taskList").appendChild(li);
        taskInput.value = "";
    }
    </script>

</body>
</html>
